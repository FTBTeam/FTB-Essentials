modLoader = "javafml"
loaderVersion = "[${neoforge_loader_version},)"
issueTrackerURL = "https://go.ftb.team/support-mod-issues"
license = "All Rights Reserved"

[[mixins]]
config = "ftbessentials-common.mixins.json"

[[mods]]
modId = "ftbessentials"
version = "${version}"
displayName = "FTB Essentials"
authors = "FTB Team"
description = '''
Adds many essential utility commands for servers
'''
displayTest="IGNORE_SERVER_VERSION"

[[dependencies.ftbessentials]]
modId = "neoforge"
type = "required"
versionRange = "${neoforge_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbessentials]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range_maven}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbessentials]]
modId = "ftblibrary"
type = "required"
versionRange = "${ftb_library_version_range_maven}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbessentials]]
modId = "ftbranks"
type = "optional"
versionRange = "${ftb_ranks_version_range_maven}"
ordering = "AFTER"
side = "BOTH"

[[dependencies.ftbessentials]]
modId = "luckperms"
type = "optional"
versionRange = "[5.4.83,)"
ordering = "AFTER"
side = "SERVER"
